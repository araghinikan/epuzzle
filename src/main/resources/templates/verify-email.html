<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأیید ایمیل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" dir="rtl">
<div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800">تأیید ایمیل</h1>
        <p class="text-gray-500 mt-2">کد تأیید ارسال شده به ایمیل خود را وارد کنید</p>
    </div>

    <form id="verifyForm" class="space-y-6">
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>
        <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm"></div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">کد تأیید</label>
            <input type="text" id="code" required maxlength="6"
                   class="w-full px-4 py-3 text-center text-2xl tracking-widest border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="______">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">
            تأیید ایمیل
        </button>

        <div class="text-center">
            <p class="text-sm text-gray-600">
                کد را دریافت نکردید؟
                <button type="button" id="resendBtn" class="text-blue-600 hover:text-blue-800 font-medium">
                    ارسال مجدد
                </button>
            </p>
            <p class="text-xs text-gray-400 mt-2" id="timer">۰:۳۰</p>
        </div>

        <p class="text-center text-gray-600 text-sm">
            <a href="/login" class="text-blue-600 hover:text-blue-800 font-medium">بازگشت به صفحه ورود</a>
        </p>
    </form>
</div>

<script>
    let timer = 30;
    let timerInterval;

    function startTimer() {
        timer = 30;
        const timerElement = document.getElementById('timer');
        document.getElementById('resendBtn').disabled = true;
        document.getElementById('resendBtn').classList.add('opacity-50', 'cursor-not-allowed');

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timer--;
            timerElement.textContent = `۰:${timer.toString().padStart(2, '0')}`;
            if (timer <= 0) {
                clearInterval(timerInterval);
                document.getElementById('resendBtn').disabled = false;
                document.getElementById('resendBtn').classList.remove('opacity-50', 'cursor-not-allowed');
                timerElement.textContent = 'ارسال مجدد';
            }
        }, 1000);
    }

    startTimer();

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('code').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        if (code.length !== 6) {
            errorDiv.textContent = 'کد تأیید باید ۶ رقم باشد';
            errorDiv.classList.remove('hidden');
            return;
        }

        try {
            // Simulate verification - replace with actual API call
            const response = await fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });

            const data = await response.json();

            if (response.ok) {
                successDiv.textContent = 'ایمیل شما با موفقیت تأیید شد!';
                successDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                errorDiv.textContent = data.message || 'کد تأیید نامعتبر است';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            errorDiv.textContent = 'خطا در ارتباط با سرور';
            errorDiv.classList.remove('hidden');
        }
    });

    document.getElementById('resendBtn').addEventListener('click', async () => {
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        try {
            const email = localStorage.getItem('email');
            const response = await fetch('/api/auth/resend-verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                successDiv.textContent = 'کد تأیید مجدداً ارسال شد';
                successDiv.classList.remove('hidden');
                startTimer();
            } else {
                errorDiv.textContent = data.message || 'خطا در ارسال مجدد کد';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            errorDiv.textContent = 'خطا در ارتباط با سرور';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
