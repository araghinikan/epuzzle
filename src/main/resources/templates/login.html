<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" dir="rtl">
<div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">خوش آمدید</h1>
        <p class="text-gray-500 mt-2">وارد حساب کاربری خود شوید</p>
    </div>

    <form id="loginForm" class="space-y-6">
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ایمیل</label>
            <input type="email" id="email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="example@gmail.com">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">رمز عبور</label>
            <input type="password" id="password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="********">
        </div>

        <div class="flex items-center justify-between">
            <label class="flex items-center">
                <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <span class="mr-2 text-sm text-gray-600">مرا به خاطر بسپار</span>
            </label>
            <a href="/reset-password" class="text-sm text-blue-600 hover:text-blue-800">رمز عبور را فراموش کرده‌اید؟</a>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">
            ورود
        </button>

        <p class="text-center text-gray-600 text-sm">
            حساب کاربری ندارید؟
            <a href="/signup" class="text-blue-600 hover:text-blue-800 font-medium">ثبت نام</a>
        </p>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        errorDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);
                window.location.href = '/dashboard';
            } else {
                errorDiv.textContent = data.message || 'خطا در ورود به سیستم';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            errorDiv.textContent = 'خطا در ارتباط با سرور';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
