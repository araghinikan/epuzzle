<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازیابی رمز عبور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" dir="rtl">
<div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">بازیابی رمز عبور</h1>
        <p class="text-gray-500 mt-2">ایمیل خود را وارد کنید تا لینک بازیابی برای شما ارسال شود</p>
    </div>

    <form id="resetForm" class="space-y-6">
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>
        <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm"></div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ایمیل</label>
            <input type="email" id="email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="example@gmail.com">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">
            ارسال لینک بازیابی
        </button>

        <p class="text-center text-gray-600 text-sm">
            <a href="/login" class="text-blue-600 hover:text-blue-800 font-medium">بازگشت به صفحه ورود</a>
        </p>
    </form>
</div>

<script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                successDiv.textContent = 'لینک بازیابی به ایمیل شما ارسال شد';
                successDiv.classList.remove('hidden');
                // Store token for confirm reset page
                if (data.resetToken) {
                    localStorage.setItem('resetToken', data.resetToken);
                }
                setTimeout(() => {
                    window.location.href = '/confirm-reset';
                }, 2000);
            } else {
                errorDiv.textContent = data.message || 'ایمیل یافت نشد';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            errorDiv.textContent = 'خطا در ارتباط با سرور';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
