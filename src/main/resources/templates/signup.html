<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" dir="rtl">
<div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">ثبت نام</h1>
        <p class="text-gray-500 mt-2">حساب کاربری جدید ایجاد کنید</p>
    </div>

    <form id="signupForm" class="space-y-6">
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>
        <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm"></div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">نام کاربری</label>
            <input type="text" id="username" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="نام کاربری خود را وارد کنید">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ایمیل</label>
            <input type="email" id="email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="example@gmail.com">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">رمز عبور</label>
            <input type="password" id="password" required minlength="6"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="حداقل ۶ کاراکتر">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">تکرار رمز عبور</label>
            <input type="password" id="confirmPassword" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="رمز عبور را تکرار کنید">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">
            ثبت نام
        </button>

        <p class="text-center text-gray-600 text-sm">
            قبلاً ثبت نام کرده‌اید؟
            <a href="/login" class="text-blue-600 hover:text-blue-800 font-medium">ورود</a>
        </p>
    </form>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        if (password !== confirmPassword) {
            errorDiv.textContent = 'رمز عبور و تکرار آن مطابقت ندارند';
            errorDiv.classList.remove('hidden');
            return;
        }

        if (password.length < 6) {
            errorDiv.textContent = 'رمز عبور باید حداقل ۶ کاراکتر باشد';
            errorDiv.classList.remove('hidden');
            return;
        }

        try {
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('email', data.email);
                successDiv.textContent = 'ثبت نام با موفقیت انجام شد! به صفحه تأیید ایمیل هدایت می‌شوید...';
                successDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = '/verify-email';
                }, 2000);
            } else {
                errorDiv.textContent = data.message || 'خطا در ثبت نام';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            errorDiv.textContent = 'خطا در ارتباط با سرور';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
