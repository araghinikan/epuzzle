<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغییر رمز عبور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" dir="rtl">
<div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">تغییر رمز عبور</h1>
        <p class="text-gray-500 mt-2">رمز عبور جدید خود را وارد کنید</p>
    </div>

    <form id="confirmResetForm" class="space-y-6">
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>
        <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm"></div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">رمز عبور جدید</label>
            <input type="password" id="newPassword" required minlength="6"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="حداقل ۶ کاراکتر">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">تکرار رمز عبور جدید</label>
            <input type="password" id="confirmNewPassword" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                   placeholder="رمز عبور را تکرار کنید">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">
            تغییر رمز عبور
        </button>

        <p class="text-center text-gray-600 text-sm">
            <a href="/login" class="text-blue-600 hover:text-blue-800 font-medium">بازگشت به صفحه ورود</a>
        </p>
    </form>
</div>

<script>
    document.getElementById('confirmResetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmNewPassword = document.getElementById('confirmNewPassword').value;
        const resetToken = localStorage.getItem('resetToken');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        if (newPassword !== confirmNewPassword) {
            errorDiv.textContent = 'رمز عبور و تکرار آن مطابقت ندارند';
            errorDiv.classList.remove('hidden');
            return;
        }

        if (newPassword.length < 6) {
            errorDiv.textContent = 'رمز عبور باید حداقل ۶ کاراکتر باشد';
            errorDiv.classList.remove('hidden');
            return;
        }

        if (!resetToken) {
            errorDiv.textContent = 'توکن بازیابی یافت نشد. لطفاً دوباره درخواست بازیابی کنید';
            errorDiv.classList.remove('hidden');
            return;
        }

        try {
            const response = await fetch('/api/auth/confirm-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resetToken, newPassword })
            });

            const data = await response.json();

            if (response.ok) {
                successDiv.textContent = 'رمز عبور با موفقیت تغییر یافت';
                successDiv.classList.remove('hidden');
                localStorage.removeItem('resetToken');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                errorDiv.textContent = data.message || 'خطا در تغییر رمز عبور';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            errorDiv.textContent = 'خطا در ارتباط با سرور';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
